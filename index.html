<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toto List</title>

  <style>
    body{
      margin:0;
      font-family:sans-serif;
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .card{
      background:white;
      width:90%;
      max-width:420px;
      padding:30px;
      border-radius:20px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
      text-align:center;
    }

    .app-icon{
      width:660px;
      height:660px;
      border-radius:25px;
      margin-bottom:20px;
    }

    h1{
      margin:10px 0;
    }

    p{
      color:#666;
      line-height:1.6;
    }

    .download-btn{
      display:inline-block;
      margin-top:20px;
      padding:15px 30px;
      background:#4CAF50;
      color:white;
      text-decoration:none;
      border-radius:12px;
      font-size:18px;
      font-weight:bold;
    }

    .download-btn:hover{
      background:#43a047;
    }

    .guide{
      margin-top:30px;
      text-align:left;
      background:#fafafa;
      padding:15px;
      border-radius:12px;
      font-size:14px;
    }

    li{
      margin-bottom:10px;
    }
  </style>
</head>

<body>

  <div class="card">

    <img class="app-icon"
      src="./todolistIcon.png">

    <h1>Todo List</h1>

    <p>
       😊
    </p>

    <a class="download-btn"
      href="./app-debug.apk">
      앱 다운로드
    </a>

    <div class="guide">
      <h3>설치 방법</h3>

      <ol>
        <li>다운로드 버튼 누르기</li>
        <li>다운로드 완료 후 파일 열기</li>
        <li>"허용" 또는 "계속 설치" 누르기</li>
        <li>설치 완료 😊</li>
      </ol>

    </div>

  </div>

</body>
</html>
